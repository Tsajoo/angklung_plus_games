name: Build Flutter APK
on:
  workflow_dispatch: # Manual button only
jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      # 1. Regenerate Android project (Matches your pubspec.yaml name automatically)
      - name: Regenerate Android project
        run: |
          rm -rf android/
          flutter create --org com.jockey --platforms=android .

# 2. SAFE BUILD FIX — all done in Python to avoid shell-quoting bugs
      - name: Write patch script
        run: |
          cat > android_patch.py <<'PYEOF'
          ... (same python content as above) ...
          PYEOF

      - name: Run patch script
        run: python3 android_patch.py

      - name: Write patch script
        run: |
          cat > android_patch.py <<'PYEOF'
          import pathlib
          import re

          root = pathlib.Path(".")

          def patch(path, replacements, label):
              p = root / path
              if not p.exists():
                  print(f"⚠️  Skipped {label}: {path} not found")
                  return
              text = p.read_text()
              original = text
              for pattern, repl in replacements:
                  text = re.sub(pattern, repl, text)
              if text != original:
                  p.write_text(text)
                  print(f"✅ Patched {label}")
              else:
                  print(f"ℹ️  No changes needed for {label}")

          # A. Update SDK to 35 (Required by audioplayers)
          patch("android/app/build.gradle", [
              (r"flutter\.compileSdkVersion", "35"),
              (r"flutter\.targetSdkVersion", "35"),
          ], "compile/target SDK")

          # B. Update Kotlin to 1.9.24 (Required by shared_preferences)
          patch("android/settings.gradle", [
              (r'id "org\.jetbrains\.kotlin\.android" version "[^"]*"',
               'id "org.jetbrains.kotlin.android" version "1.9.24"'),
          ], "Kotlin version (settings.gradle)")

          patch("android/build.gradle", [
              (r"ext\.kotlin_version\s*=\s*['\"][^'\"]*['\"]",
               "ext.kotlin_version = '1.9.24'"),
          ], "Kotlin version (build.gradle)")

          # C. Update Android Gradle Plugin (AGP) to 8.3.2
          patch("android/settings.gradle", [
              (r'id "com\.android\.application" version "[^"]*"',
               'id "com.android.application" version "8.3.2"'),
          ], "AGP version (settings.gradle)")

          patch("android/build.gradle", [
              (r"classpath ['\"]com\.android\.tools\.build:gradle:[^'\"]*['\"]",
               "classpath 'com.android.tools.build:gradle:8.3.2'"),
          ], "AGP version (build.gradle)")

          # D. Update Gradle Wrapper to 8.4 (Required by AGP 8.3.2)
          patch("android/gradle/wrapper/gradle-wrapper.properties", [
              (r"gradle-[0-9.]*-all\.zip", "gradle-8.4-all.zip"),
              (r"gradle-[0-9.]*-bin\.zip", "gradle-8.4-bin.zip"),
          ], "Gradle wrapper version")

          # E. Update NDK to 25.1.8937393 (Silences NDK warnings) — only if absent
          gradle_path = root / "android/app/build.gradle"
          gradle_text = gradle_path.read_text()
          if "ndkVersion" not in gradle_text:
              gradle_text = gradle_text.replace(
                  "android {", 'android {\n    ndkVersion "25.1.8937393"', 1
              )
              gradle_path.write_text(gradle_text)
              print("✅ Added ndkVersion")
          else:
              print("ℹ️  ndkVersion already present")

          # F. Safely add INTERNET permission
          manifest_path = root / "android/app/src/main/AndroidManifest.xml"
          manifest_text = manifest_path.read_text()
          if "android.permission.INTERNET" not in manifest_text:
              manifest_text = re.sub(
                  r"(<manifest[^>]*>)",
                  r'\1\n    <uses-permission android:name="android.permission.INTERNET" />',
                  manifest_text,
                  count=1,
              )
              manifest_path.write_text(manifest_text)
              print("✅ Added INTERNET permission")
          else:
              print("ℹ️  INTERNET permission already present")

          print("✅ All Android build configurations patched successfully.")
          PYEOF

      - name: Run patch script
        run: python3 android_patch.py

      - name: Show patched manifest (debug)
        run: cat android/app/src/main/AndroidManifest.xml

      - name: Show patched app/build.gradle (debug)
        run: cat android/app/build.gradle

      - name: Show patched settings.gradle / build.gradle (debug)
        run: |
          echo "--- android/settings.gradle ---"
          cat android/settings.gradle
          echo "--- android/build.gradle ---"
          cat android/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angklung-plus-games-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
