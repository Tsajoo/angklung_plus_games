name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java (required for Android builds)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0' # Adjust this if your project requires a specific Flutter version

      # 4. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Build the Release APK
      - name: Build Release APK
        run: flutter build apk --release

      # 6. Upload the APK as a GitHub Actions artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angklung-iot-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
