name: Build Flutter APK
on:
  workflow_dispatch: # Manual button only
jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      # 0. Fail fast if the icon file is missing — no silent fallback
      - name: Verify icon asset exists
        run: |
          if [ ! -f "assets/icon.png" ]; then
            echo "❌ assets/icon.png not found in the repo."
            echo "   Add your icon file at that exact path and commit it."
            exit 1
          fi
          echo "✅ Found assets/icon.png"
          file assets/icon.png

      # 1. Regenerate Android project (Matches your pubspec.yaml name automatically)
      - name: Regenerate Android project
        run: |
          rm -rf android/
          flutter create --org com.jockey --platforms=android .

      # 2. Patch pubspec.yaml to add flutter_launcher_icons config (idempotent)
      - name: Write pubspec patch script
        run: |
          cat > pubspec_patch.py <<'PYEOF'
          import pathlib

          p = pathlib.Path("pubspec.yaml")
          text = p.read_text()

          if "flutter_launcher_icons:" not in text:
              # Add dev_dependency
              if "dev_dependencies:" in text:
                  text = text.replace(
                      "dev_dependencies:",
                      "dev_dependencies:\n  flutter_launcher_icons: ^0.13.1",
                      1,
                  )
              else:
                  text += "\ndev_dependencies:\n  flutter_launcher_icons: ^0.13.1\n"

              # Add config block at end of file
              text += (
                  "\nflutter_launcher_icons:\n"
                  "  android: true\n"
                  "  ios: false\n"
                  '  image_path: "assets/icon.png"\n'
                  "  min_sdk_android: 21\n"
                  '  adaptive_icon_background: "#FCE4EC"\n'
                  '  adaptive_icon_foreground: "assets/icon.png"\n'
              )
              p.write_text(text)
              print("✅ Added flutter_launcher_icons config to pubspec.yaml")
          else:
              print("ℹ️  flutter_launcher_icons config already present in pubspec.yaml")

          # Make sure assets/icon/ is declared under flutter: assets: too,
          # so the file is bundled (harmless even though launcher_icons
          # reads it directly from disk, not via the asset bundle)
          if "assets/icon/" not in text and "flutter:" in text:
              if "assets:" in text:
                  text = text.replace(
                      "assets:",
                      "assets:\n    - assets/icon.png",
                      1,
                  )
              else:
                  text = text.replace(
                      "flutter:",
                      "flutter:\n  assets:\n    - assets/icon.png",
                      1,
                  )
              p.write_text(text)
              print("✅ Declared assets/icon.png under flutter: assets:")
          PYEOF

      - name: Run pubspec patch script
        run: python3 pubspec_patch.py

      - name: Show patched pubspec.yaml (debug)
        run: cat pubspec.yaml

      # 3. SAFE BUILD FIX — all done in Python to avoid shell-quoting bugs
      - name: Write patch script
        run: |
          cat > android_patch.py <<'PYEOF'
          import pathlib
          import re

          root = pathlib.Path(".")

          def patch(path, replacements, label):
              p = root / path
              if not p.exists():
                  print(f"Skipped {label}: {path} not found")
                  return
              text = p.read_text()
              original = text
              for pattern, repl in replacements:
                  text = re.sub(pattern, repl, text)
              if text != original:
                  p.write_text(text)
                  print(f"Patched {label}")
              else:
                  print(f"No changes needed for {label}")

          patch("android/app/build.gradle", [
              (r"flutter\.minSdkVersion", "21"),
              (r"minSdkVersion\s+\d+", "minSdkVersion 21"),
              (r"flutter\.compileSdkVersion", "35"),
              (r"flutter\.targetSdkVersion", "35"),
          ], "min/compile/target SDK")

          patch("android/settings.gradle", [
              (r'id "org\.jetbrains\.kotlin\.android" version "[^"]*"',
               'id "org.jetbrains.kotlin.android" version "1.9.24"'),
          ], "Kotlin version (settings.gradle)")

          patch("android/build.gradle", [
              (r"ext\.kotlin_version\s*=\s*['\"][^'\"]*['\"]",
               "ext.kotlin_version = '1.9.24'"),
          ], "Kotlin version (build.gradle)")

          patch("android/settings.gradle", [
              (r'id "com\.android\.application" version "[^"]*"',
               'id "com.android.application" version "8.3.2"'),
          ], "AGP version (settings.gradle)")

          patch("android/build.gradle", [
              (r"classpath ['\"]com\.android\.tools\.build:gradle:[^'\"]*['\"]",
               "classpath 'com.android.tools.build:gradle:8.3.2'"),
          ], "AGP version (build.gradle)")

          patch("android/gradle/wrapper/gradle-wrapper.properties", [
              (r"gradle-[0-9.]*-all\.zip", "gradle-8.4-all.zip"),
              (r"gradle-[0-9.]*-bin\.zip", "gradle-8.4-bin.zip"),
          ], "Gradle wrapper version")

          gradle_path = root / "android/app/build.gradle"
          gradle_text = gradle_path.read_text()

          if re.search(r"^\s*ndkVersion\s*=?\s*.+$", gradle_text, flags=re.MULTILINE):
              gradle_text = re.sub(
                  r"^\s*ndkVersion\s*=?\s*.+$",
                  '    ndkVersion = "25.1.8937393"',
                  gradle_text,
                  count=1,
                  flags=re.MULTILINE,
              )
              print("Replaced existing ndkVersion line")
          else:
              gradle_text = gradle_text.replace(
                  "android {", 'android {\n    ndkVersion = "25.1.8937393"', 1
              )
              print("Inserted new ndkVersion line")
          gradle_path.write_text(gradle_text)

          gradle_text = gradle_path.read_text()
          if "abiFilters" not in gradle_text:
              gradle_text = re.sub(
                  r"defaultConfig\s*\{",
                  'defaultConfig {\n        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }',
                  gradle_text,
                  count=1,
              )
              gradle_path.write_text(gradle_text)
              print("Added explicit abiFilters")
          else:
              print("abiFilters already present")

          gradle_text = gradle_path.read_text()
          if "multiDexEnabled" not in gradle_text:
              gradle_text = re.sub(
                  r"defaultConfig\s*\{",
                  'defaultConfig {\n        multiDexEnabled true',
                  gradle_text,
                  count=1,
              )
              gradle_path.write_text(gradle_text)
              print("Enabled multiDex")
          else:
              print("multiDex already configured")

          gradle_text = gradle_path.read_text()
          if "coreLibraryDesugaring" not in gradle_text:
              if "compileOptions" in gradle_text:
                  gradle_text = re.sub(
                      r"compileOptions\s*\{",
                      "compileOptions {\n        coreLibraryDesugaringEnabled true",
                      gradle_text,
                      count=1,
                  )
              else:
                  gradle_text = re.sub(
                      r"android\s*\{",
                      'android {\n    compileOptions {\n        coreLibraryDesugaringEnabled true\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }',
                      gradle_text,
                      count=1,
                  )
              if "dependencies {" in gradle_text:
                  gradle_text = re.sub(
                      r"dependencies\s*\{",
                      'dependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"',
                      gradle_text,
                      count=1,
                  )
              else:
                  gradle_text += '\ndependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"\n}\n'
              gradle_path.write_text(gradle_text)
              print("Enabled core library desugaring")
          else:
              print("Core library desugaring already configured")

          manifest_path = root / "android/app/src/main/AndroidManifest.xml"
          manifest_text = manifest_path.read_text()

          if "android.permission.INTERNET" not in manifest_text:
              manifest_text = re.sub(
                  r"(<manifest[^>]*>)",
                  r'\1\n    <uses-permission android:name="android.permission.INTERNET" />',
                  manifest_text,
                  count=1,
              )
              print("Added INTERNET permission")
          else:
              print("INTERNET permission already present")

          if 'android:name=".MainActivity"' in manifest_text and "android:exported" not in manifest_text:
              manifest_text = manifest_text.replace(
                  'android:name=".MainActivity"',
                  'android:name=".MainActivity"\n            android:exported="true"',
                  1,
              )
              print("Added android:exported to MainActivity")
          else:
              print("android:exported already present or MainActivity tag not found as expected")

          manifest_path.write_text(manifest_text)

          manifest_text = manifest_path.read_text()
          manifest_text = re.sub(
              r'android:label="[^"]*"',
              'android:label="Angklung IoT"',
              manifest_text,
          )
          manifest_path.write_text(manifest_text)
          print("Set app label")

          print("All Android build configurations patched successfully.")
          PYEOF

      - name: Run patch script
        run: python3 android_patch.py

      - name: Show patched manifest (debug)
        run: cat android/app/src/main/AndroidManifest.xml

      - name: Show patched app/build.gradle (debug)
        run: cat android/app/build.gradle

      - name: Show patched settings.gradle / build.gradle (debug)
        run: |
          echo "--- android/settings.gradle ---"
          cat android/settings.gradle
          echo "--- android/build.gradle ---"
          cat android/build.gradle

      - name: Install dependencies
        run: flutter pub get

      # 4. Snapshot the default icons BEFORE generation, so we can prove
      #    they actually changed after
      - name: Snapshot default mipmap icons (debug)
        run: |
          echo "--- Before generation ---"
          find android/app/src/main/res -iname "ic_launcher*" -exec md5sum {} \;

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Verify mipmap icons actually changed (debug)
        run: |
          echo "--- After generation ---"
          find android/app/src/main/res -iname "ic_launcher*" -exec md5sum {} \;

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angklung-plus-games-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
