name: Build Flutter APK

on:
  workflow_dispatch: # Manual button only

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      # 1. Regenerate Android project (Matches your pubspec.yaml name automatically)
      - name: Regenerate Android project
        run: |
          rm -rf android/
          flutter create --org com.jockey --platforms=android .

      # 2. SAFE BUILD FIX (No XML mangling)
      - name: Fix Android Build Configuration
        run: |
          echo "🔧 Patching Android build files safely..."
          
          # A. Update SDK to 35 (Required by audioplayers)
          sed -i 's/flutter\.compileSdkVersion/35/g' android/app/build.gradle
          sed -i 's/flutter\.targetSdkVersion/35/g' android/app/build.gradle
          
          # B. Update Kotlin to 1.9.24 (Required by shared_preferences)
          sed -i 's/id "org\.jetbrains\.kotlin\.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/g' android/settings.gradle
          sed -i "s/ext\.kotlin_version = ['\"][^'\"]*['\"]/ext.kotlin_version = '1.9.24'/g" android/build.gradle
          
          # C. Update Android Gradle Plugin (AGP) to 8.3.2
          sed -i 's/id "com\.android\.application" version "[^"]*"/id "com.android.application" version "8.3.2"/g' android/settings.gradle
          sed -i "s/classpath 'com\.android\.tools\.build:gradle:[^']*'/classpath 'com.android.tools.build:gradle:8.3.2'/g" android/build.gradle
          sed -i 's/classpath "com\.android\.tools\.build:gradle:[^"]*"/classpath "com.android.tools.build:gradle:8.3.2"/g" android/build.gradle

          # D. Update Gradle Wrapper to 8.4 (Required by AGP 8.3.2)
          sed -i 's/gradle-[0-9.]*-all.zip/gradle-8.4-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/gradle-[0-9.]*-bin.zip/gradle-8.4-bin.zip/g' android/gradle/wrapper/gradle-wrapper.properties

          # E. Update NDK to 25.1.8937393 (Silences NDK warnings)
          sed -i '/android {/a\    ndkVersion "25.1.8937393"' android/app/build.gradle

          # F. SAFELY add INTERNET permission using Python (Prevents XML corruption)
          python3 - <<'PYEOF'
          import pathlib
          manifest_path = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          content = manifest_path.read_text()
          if 'android.permission.INTERNET' not in content:
              content = content.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">', 
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET" />'
              )
              manifest_path.write_text(content)
              print("✅ Safely added INTERNET permission.")
          else:
              print("✅ INTERNET permission already present.")
          PYEOF
          
          echo "✅ All Android build configurations patched successfully."

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angklung-plus-games-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
