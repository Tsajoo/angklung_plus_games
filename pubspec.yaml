name: angklung_iot
description: App to Control Angklung from Internet
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dev_dependencies:
  flutter_launcher_icons: ^0.13.1   # latest version at the time

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.0

flutter:
  uses-material-design: true    # ← must be here
  assets:
    - assets/notes/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FCE4EC"
  adaptive_icon_foreground: "assets/icon.png"
